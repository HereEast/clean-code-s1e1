<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Todo App</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
  </head>

  <body>
    <header class="header wrapper">
      <img src="./eisenhower-matrix.jpg" alt="eisenhower-matrix">
      <a class="details-link" 
         href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </header>

    <main class="main wrapper">

      <!-- ADD ITEM -->

      <section class="add-item-section section">
        <label class="section-title" for="input-add-item">Add Item</label>
      </section>

      <div class="add-item-block">
        <input id="input-add-item" class="text-input" type="text"> <!-- TYPE TEXT-->
        <button id="button-add" class="button-add">Add</button>
      </div>

      <!-- TODO -->
      
      <section class="todo-section section">
        <label class="section-title" for="new-task">Todo</label>
      </section>

      <ul id="todo-tasks">
        <li>
          <input type="checkbox" class='checkbox'>
          <label class="task text-input">Pay Bills</label>
          <input type="text" value="Pay Bills" class="input-edit-text text-input"> <!-- TYPE TEXT-->

          <button class="button-edit">Edit</button>
          <button class="button-delete">
            <img src="./remove.svg">
          </button>

        </li>

        <li class="edit-mode">
          <input type="checkbox" class='checkbox'>
          <label class="task text-input">Go Shopping</label>
          <input type="text" value="Go Shopping" class="input-edit-text text-input"> <!-- TYPE TEXT-->

          <button class="button-edit">Save</button>
          <button class="button-delete">
            <img src="./remove.svg">
          </button>

        </li>
      </ul>

      <!-- COMPLETED -->

      <section class="completed-section section">
        <label class="section-title" for="new-task">Completed</label>
      </section>

      <ul class="completed-tasks">
        <li>
          <input type="checkbox" class='checkbox' checked>
          <label class="task">See the Doctor</label>
          <input type="text" class="task text-input"> <!-- TYPE TEXT-->

          <button class="button-edit">Edit</button>
          <button class="button-delete">
            <img src="./remove.svg">
          </button>

        </li>
      </ul>
    </main>

  <script src="app.js"></script>

  </body>
</html>
