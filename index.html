<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Todo App</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
  </head>

  <body>
    <header class="header wrapper">
      <img src="./eisenhower-matrix.jpg" alt="eisenhower-matrix">
      <a class="details-link" 
         href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </header>

    <main class="main wrapper">

      <!-- ADD ITEM -->

      <section class="add-task-section">
        <label class="section-title">Add Item</label>

        <div class="add-task-block">
          <input id="input-add-task" class="text-input" type="text"> 
          <button id="button-add" class="button-add">Add</button>
        </div>
      </section>

      <!-- TODO -->
      
      <section class="todo-section">
        <label class="section-title">Todo</label>

        <ul id="todo-tasks">

          <li>
            <input class="checkbox" type="checkbox">
            <label class="task-name">Pay Bills</label>
            <input class="text-input" value="Pay Bills" type="text"> 

            <button class="button-edit">Edit</button>
            <button class="button-delete">
              <img src="./remove.svg" alt="remove-icon">
            </button>
          </li>

          <li class="edit-mode">
            <input class="checkbox" type="checkbox">
            <label class="task-name">Go Shopping</label>
            <input class="text-input" value="Go Shopping" type="text"> 

            <button class="button-edit">Save</button>
            <button class="button-delete">
              <img src="./remove.svg" alt="remove-icon">
            </button>
          </li>

        </ul>
      </section>

      <!-- COMPLETED -->

      <section class="completed-section">
        <label class="section-title">Completed</label>

        <ul class="completed-tasks">
          <li>
            <input type="checkbox" class='checkbox' checked>
            <label class="task-name">See the Doctor</label>
            <input type="text" class="text-input">   

            <button class="button-edit">Edit</button>
            <button class="button-delete">
              <img src="./remove.svg" alt="remove-icon">
            </button>
          </li>

        </ul>
      </section>
    </main>

  <script src="app.js"></script>

  </body>
</html>
