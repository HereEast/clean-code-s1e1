<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Todo App</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
  </head>

  <body>
    <header class="header wrapper">
      <img src="./eisenhower-matrix.jpg" alt="eisenhower-matrix">
      <a class="details-link" 
         href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </header>

    <main class="main wrapper">
      <section class="add-item section">
        <label class="section-title" for="new-task">Add Item</label>
      </section>

      <div class="add-item-container">
        <input id="new-task" class="add-item-input" type="text">
        <button class="button-add">Add</button>
      </div>
      
      <h3>Todo</h3>

      <ul id="todo-tasks">
        <li>
        <input type="checkbox" class='checkbox'>
        <label class="task">Pay Bills</label>
        <input type="text">
        <button class="edit">Edit</button>
        <button class="delete"><img src="./remove.svg"></button>
        </li>

        <li class="editMode">
        <input type="checkbox" class='checkbox'>
        <label class="task">Go Shopping</label>
        <input type="text" value="Go Shopping" class="task">
        <button class="edit">Save</button>
        <button class="delete"><img src="./remove.svg"></button>
        </li>
        </ul>

      <h3>Completed</h3>

      <ul id="completed-tasks">
      <li><input type="checkbox" class='checkbox' checked>
        <label class="task">See the Doctor</label>
        <input type="text" class="task">
        <button class="edit">Edit</button>
        <button class="delete"><img src="./remove.svg"></button>
      </li>
      </ul>
    </main>

  <script src="app.js"></script>

  </body>
</html>
